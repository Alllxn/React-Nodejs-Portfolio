name: Deploy to IONOS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm --prefix client install --frozen-lockfile

      - name: Build React app
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to IONOS
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PATH: ${{ secrets.SSH_PATH }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          HOST=$(printf '%s' "$SSH_HOST" | tr -d '[:space:]')
          USER=$(printf '%s' "$SSH_USER" | tr -d '[:space:]')
          PORT=$(printf '%s' "$SSH_PORT" | tr -d '[:space:]')
          DEST=$(printf '%s' "$SSH_PATH" | tr -d '\n\r')
          rsync -avz --delete -e "ssh -i ~/.ssh/id_ed25519 -p $PORT -o StrictHostKeyChecking=no" client/dist/ "$USER@$HOST:$DEST"

      - name: Trigger Render deploy
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: '[ -n "$HOOK" ] && curl -s "$HOOK" || echo "No deploy hook configured"'
